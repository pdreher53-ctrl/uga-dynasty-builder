[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Let Netlify Functions handle their own routes (don't rewrite to SPA)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Handle client-side routing — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
